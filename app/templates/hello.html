<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BIPM Visitor Counter</title>
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
</head>

<body>
    <header>
        <nav>
            <a href="{{ url_for('hello') }}" aria-current="page">Home</a>
            <a href="{{ url_for('titanic') }}">Titanic</a>
            <a href="https://github.com/pbrecken" target="_blank" rel="noopener">About</a>
        </nav>
        <h1>Hello {{ name }}!</h1>
        <p>This Docker Compose app uses Flask, Redis, templates, and static files.</p>
    </header>

    <main>
        <img class="hero-image" src="{{ url_for('static', filename='berlin-data.svg') }}" alt="Berlin skyline with data bars">
        <p class="counter">I have been seen <strong>{{ count }}</strong> times.</p>
        <p>
            Visit the
            <a href="https://www.hwr-berlin.de/" target="_blank" rel="noopener">HWR Berlin homepage</a>.
        </p>
    </main>

    <footer>
        <p>Created by Paula.</p>
    </footer>
</body>

</html>
